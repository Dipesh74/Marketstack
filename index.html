<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Stock Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>📊 Smart Stock Dashboard</h1>
    <div class="search-box">
      <input type="text" id="symbolInput" placeholder="e.g. AAPL, TSLA" aria-label="Stock Symbol">
      <button onclick="getStockData()">Search</button>
    </div>
    <div id="loader" class="hidden">Fetching Market Data...</div>
    <section id="stockResult" class="card hidden">
      <h2 id="stockName"></h2>
      <p><strong>Price:</strong> $<span id="price"></span></p>
      <p><strong>Date:</strong> <span id="date"></span></p>
      <hr style="border: 0.5px solid rgba(255,255,255,0.1)">
      <p><strong>Open:</strong> <span id="open"></span></p>
      <p><strong>High:</strong> <span id="high"></span></p>
      <p><strong>Low:</strong> <span id="low"></span></p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
